name: Build release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.platform.host }}
    runs-on: ${{ matrix.platform.runner }}
    env:
      QT_VERSION: "6.8.3"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            host: linux
            qt_arch: linux_gcc_64
            qt_install_name: gcc_64
            build_args: --target appimage
            artifact_name: linux-x86_64
            artifact_path: build/NeurolingsCE.AppImage

          - runner: ubuntu-24.04-arm
            host: linux_arm64
            qt_arch: linux_gcc_arm64
            qt_install_name: gcc_arm64
            build_args: --target appimage
            artifact_name: linux-arm64
            artifact_path: build/NeurolingsCE.AppImage

          - runner: windows-latest
            host: windows
            qt_arch: win64_msvc2022_64
            qt_install_name: msvc2022_64
            artifact_name: windows-x86_64
            artifact_path: build/bin/

          - runner: macos-14
            host: mac
            qt_arch: clang_64
            qt_install_name: macos
            qt_modules: "qtmultimedia qtimageformats"
            build_args: --target macapp
            artifact_name: macos-arm64
            artifact_path: build/macos/

          - runner: macos-13
            host: mac
            qt_arch: clang_64
            qt_install_name: macos
            qt_modules: "qtmultimedia qtimageformats"
            build_args: --target macapp
            artifact_name: macos-x86_64
            artifact_path: build/macos/

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install build dependencies
        if: matrix.platform.host == 'linux' || matrix.platform.host == 'linux_arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libarchive-dev libwayland-dev wayland-protocols ccache zip
          if [ "${{ matrix.platform.host }}" = "linux_arm64" ]; then
            sudo apt-get install -y libgstreamer-plugins-bad1.0-0 libgstreamer-plugins-good1.0-0
          fi

      - name: Install macOS build dependencies
        if: matrix.platform.host == 'mac'
        run: |
          brew install ninja

      - name: Install Qt6
        uses: jdpurcell/install-qt-action@v5
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.platform.host }}
          target: "desktop"
          arch: ${{ matrix.platform.qt_arch }}
          modules: ${{ matrix.platform.qt_modules || 'qtmultimedia' }}
          tools: ${{ matrix.platform.qt_tools || '' }}
          cache: true

      - name: Setup MSVC environment
        if: matrix.platform.host == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.platform.host }}-qt6-release
          max-size: 500M

      - name: Configure with CMake
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=Release \
            -D CMAKE_PREFIX_PATH="${{ runner.workspace }}/Qt/${{ env.QT_VERSION }}/${{ matrix.platform.qt_install_name }}" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build with CMake
        shell: bash
        run: |
          cmake --build build --parallel --config Release ${{ matrix.platform.build_args || '' }}

      - name: Install WiX 7
        if: matrix.platform.host == 'windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 7.0.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" eula accept wix7
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" extension add -g WixToolset.UI.wixext/7.0.0
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" extension add -g WixToolset.Util.wixext/7.0.0
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" extension add -g WixToolset.BootstrapperApplications.wixext/7.0.0

      - name: Package Windows installers
        if: matrix.platform.host == 'windows'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\src\tools\package-windows-bin.ps1 -SourceDir build/bin
          powershell -ExecutionPolicy Bypass -File .\installer\wix\build-msi.ps1 -WixExe "$env:USERPROFILE\.dotnet\tools\wix.exe"
          powershell -ExecutionPolicy Bypass -File .\installer\wix\build-bundle.ps1 -WixExe "$env:USERPROFILE\.dotnet\tools\wix.exe"

      # actions/upload-artifact zips inputs but does not preserve macOS bundle
      # symlinks/permissions reliably across the round-trip. Pre-zip the .app
      # ourselves so the produced archive can be expanded into a working bundle.
      - name: Package macOS .app
        if: matrix.platform.host == 'mac'
        shell: bash
        run: |
          cp -R licenses build/macos/NeurolingsCE.app/Contents/Resources/
          cd build/macos
          /usr/bin/ditto -c -k --keepParent --sequesterRsrc \
            NeurolingsCE.app NeurolingsCE-${{ matrix.platform.artifact_name }}.zip

      - name: Archive ${{ matrix.platform.artifact_name }} release build
        if: matrix.platform.host != 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_path }}
          retention-days: 1

      - name: Archive ${{ matrix.platform.artifact_name }} release build
        if: matrix.platform.host == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.artifact_name }}
          path: build/macos/NeurolingsCE-${{ matrix.platform.artifact_name }}.zip
          retention-days: 1

      - name: Archive Windows installer artifacts
        if: matrix.platform.host == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installers
          path: |
            out/package/*.zip
            out/installer/*.msi
            out/installer/*-setup.exe
          retention-days: 1

